<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hold on.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
   <link rel="stylesheet" href="intermediate.css">

</head>
<body>
  <div class="envelope">
    <div class="stamp">MIND<br>FUL<br>— — —<br>PAUSE</div>

    <div class="from-line">A note from <span>past you</span></div>

    <div class="salutation">Hey, future me —</div>
    <h1 id="msg-title">Loading...</h1>
    <p class="body-text" id="msg-body"></p>

    <div class="signature-block">
      <div class="signature-text">
        Written with intention,
        <span class="signature-name">You (the wiser one)</span>
      </div>
      <div class="domain-pill" id="domain-pill"></div>
    </div>

    <div class="actions">
      <button class="btn-close" id="btn-close">← Go back</button>
      <button class="btn-continue" id="btn-continue">I'll go anyway →</button>
    </div>
  </div>
</body>
<script src="intermediate.js"></script>
</html>
