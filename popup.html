<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindful Redirect</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Mindful Redirect</h1>
  <div class="subtitle">Letters to your future self</div>

  <div class="section-label">Watching domains</div>
  <ul class="domain-list" id="domain-list"></ul>

  <div class="add-row">
    <input type="text" id="new-domain" placeholder="reddit.com" />
    <button class="add-btn" id="add-btn">Add</button>
  </div>

  <hr class="divider" />

  <div class="section-label">Your messages</div>
  <div class="msg-count" id="msg-count"></div>
  <a class="edit-link" href="#" id="edit-link">Edit messages in background.js →</a>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
